apiVersion: batch/v1
kind: CronJob
metadata:
  name: batch-pipeline
  namespace: proj12
spec:
  schedule: "0 0 * * 0"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: batch-pipeline
            image: batch-pipeline:latest
            env:
            - name: APP_CRED_SECRET
              valueFrom:
                secretKeyRef:
                  name: chameleon-creds
                  key: app_cred_secret
          restartPolicy: Never
